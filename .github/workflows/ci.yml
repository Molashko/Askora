name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: analytics_hub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d analytics_hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/analytics_hub
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development
      LLM_PROVIDER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: pip install -r requirements.txt
        working-directory: apps/api

      - name: Apply migrations
        run: alembic upgrade head
        working-directory: apps/api

      - name: Seed demo data
        run: python -m app.seed.seed_demo
        working-directory: apps/api

      - name: Run backend tests
        run: python -m unittest discover -s tests -p "test_*.py"
        working-directory: apps/api

      - name: Run NL2SQL regression gate
        run: python -m app.scripts.query_regression --strict-cases --min-pass-rate 90 --max-false-block-rate 8 --max-avg-latency-ms 1200 --json-out ../../docs/query-regression-report-ci.json
        working-directory: apps/api

      - name: Run NL intent stress gate
        run: python -m app.scripts.local_intent_stress
        working-directory: apps/api

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Run web lint
        run: npm run lint
        working-directory: apps/web

      - name: Run web typecheck
        run: npm run typecheck
        working-directory: apps/web

      - name: Build web
        run: npm run build
        working-directory: apps/web

      - name: Upload regression report artifact
        uses: actions/upload-artifact@v4
        with:
          name: query-regression-report
          path: docs/query-regression-report-ci.json
